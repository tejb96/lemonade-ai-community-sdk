# Pack-only CI on GitHub-hosted runners.
#
# sdkcraft test is not run here: the workshop spread backend requires a
# workshop *.snap under tests/, and Workshop remains private (no public snap
# install / WORKSHOP_TOKEN vendoring on this runner). Run the full spread
# suite on your build server before merge:
#   ./scripts/sync-version.sh && sdkcraft test
#
# To re-enable tests in GHA later, see:
# https://documentation.ubuntu.com/canonical-workshop/latest/how-to/develop-with-workshops/run-workshops-in-github-actions/

name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup LXD
        uses: canonical/setup-lxd@a517a5346a08c624d81953578813a4fc0fe46e0b

      - name: Install sdkcraft
        shell: bash
        run: |
          set -euo pipefail
          sudo snap install sdkcraft --classic

      - name: Sync version from VERSION
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/sync-version.sh
          ./scripts/sync-version.sh

      - name: sdkcraft pack
        shell: bash
        run: |
          set -euo pipefail
          sdkcraft pack
