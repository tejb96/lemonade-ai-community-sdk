name: lemonade-server
build-base: ubuntu@24.04
title: Lemonade Server SDK
summary: Local LLM inference server with OpenAI-compatible API (AMD/CPU/NPU)
description: |
  Lemonade Server is a lightweight, open-source local LLM inference server.
  Provides OpenAI-, Ollama-, and Anthropic-compatible REST APIs, a web UI,
  and support for llama.cpp, FastFlowLM (NPU), RyzenAI, whisper.cpp, and
  stable-diffusion.cpp backends. Ideal for local AI development and testing.
version: "10.6.0"
license: Apache-2.0
contact: https://github.com/lemonade-sdk/lemonade/issues
issues: https://github.com/lemonade-sdk/lemonade/issues
source-code: https://github.com/lemonade-sdk/lemonade

# Phase 1: amd64 only. Upstream Lemonade does not currently publish a Linux
# arm64 binary or PPA suite; arm64 will be re-introduced once upstream ships
# one (or once we adopt a source-built part).
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

# -- Plugs ------------------------------------------------------------------
# model-cache:       persists Lemonade's own cache (config.json, user_models.json,
#                    backends/, models/) across workshop refreshes.
# huggingface-cache: persists Hugging Face Hub downloads. Lemonade's default
#                    `models_dir: "auto"` resolves to ~/.cache/huggingface, so
#                    without this mount weights would be wiped on every refresh.
# gpu:               auto-connected; enables hardware-accelerated backends
#                    (ROCm/Vulkan).
plugs:
  model-cache:
    interface: mount
    workshop-target: /home/workshop/.cache/lemonade

  huggingface-cache:
    interface: mount
    workshop-target: /home/workshop/.cache/huggingface

  gpu:
    interface: gpu

# -- Slots ------------------------------------------------------------------
# lemonade-api: exposes the Lemonade HTTP server on port 13305. Consumers can
#               wire this to a system-SDK tunnel plug of the same name to make
#               it reachable from the host (see examples/workshop.yaml).
slots:
  lemonade-api:
    interface: tunnel
    endpoint: 13305

# -- Parts ------------------------------------------------------------------
# Phase 2: the `lemonade` part dumps the upstream lemonade-embeddable Linux
# tarball verbatim into the SDK tree, so there is no apt / PPA dependency at
# workshop install time. `service-files` ships the systemd user-service unit
# alongside the binaries.
#
# The `organize:` map relocates the tarball contents to a flat
# `bin/` (lemond, lemonade) + `bin/resources/` layout. Two things to know:
#
#   1. craft-parts' tar source handler strips the common leading directory at
#      extraction, so after the pull step the part's install dir contains
#      `lemond`, `lemonade`, `LICENSE`, `resources/` at the root -- NOT
#      `lemonade-embeddable-<version>-ubuntu-x64/lemond` etc. organize keys
#      must therefore reference the stripped paths.
#
#   2. ${CRAFT_PROJECT_VERSION} expansion works in `source:` (proven in
#      production), but NOT inside `organize:` dictionary keys on sdkcraft
#      0.1.14 / craft-parts 1.25. Even if it did, point 1 makes it moot.
#
#   3. Resources MUST live next to the `lemond` binary (`bin/resources/`),
#      not at the SDK root, because `lemond` looks for them relative to its
#      own binary's directory. Putting them anywhere else breaks backend
#      version pinning and triggers a `Could not mount static files from ...`
#      warning at startup.
#
# `LICENSE` is already at the install root after the prefix strip, so it
# needs no organize entry -- it's pulled in by `prime:` directly.
parts:
  lemonade:
    plugin: dump
    source: https://github.com/lemonade-sdk/lemonade/releases/download/v${CRAFT_PROJECT_VERSION}/lemonade-embeddable-${CRAFT_PROJECT_VERSION}-ubuntu-x64.tar.gz
    source-type: tar
    organize:
      lemond: bin/lemond
      lemonade: bin/lemonade
      resources: bin/resources
    prime:
      - bin/lemond
      - bin/lemonade
      - bin/resources
      - LICENSE

  service-files:
    plugin: dump
    source: service/
    source-type: local
