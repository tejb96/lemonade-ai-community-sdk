project: lemonade-server-sdk

backends:
  - name: workshop
    type: workshop

suites:
  tests/spread/integration/:
    summary: Integration tests for the lemonade-server Workshop SDK
    systems:
      - ubuntu-24.04-64

path: /home/workshop/lemonade-sdk-tests

prepare: |
  workshop launch --name lemonade-test-ws --sdk try-lemonade-server

restore: |
  workshop remove lemonade-test-ws --purge || true
