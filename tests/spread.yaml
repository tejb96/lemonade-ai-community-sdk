project: lemonade-server-workshop

path: /home/ubuntu/project

backends:
  lxd:
    systems:
      - ubuntu-24.04:
          username: ubuntu
          vm: true

suites:
  main/:
    summary: End-to-end lemonade-server-workshop SDK scenarios
    systems:
      - ubuntu-24.04
    prepare-each: |
      workshop remove ai-dev || true
    restore-each: |
      workshop remove ai-dev || true
